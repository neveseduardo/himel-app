# =============================================================================
# Himel App — Steering Configuration
# Configuração central da stack, arquitetura e padrões do projeto.
# =============================================================================

project:
  name: Himel
  type: SaaS
  domain: Controle financeiro pessoal
  language: pt-BR  # UI e mensagens
  code_language: en  # Variáveis, classes, métodos

stack:
  backend:
    framework: Laravel
    version: "13"
    language: PHP
    language_version: "8.4"
    orm: Eloquent
    auth: Fortify
    testing: PHPUnit 12
    formatter: Pint
    mcp: Laravel Boost

  frontend:
    framework: Vue
    version: "3"
    language: TypeScript
    script_style: "<script setup lang=\"ts\">"
    bridge: Inertia.js v3
    state: Pinia
    validation: Vee-Validate + Zod
    styling: Tailwind CSS 4 + Shadcn/Vue
    icons: lucide-vue-next
    notifications: vue-sonner
    routing: Wayfinder
    linter: ESLint 9

  database:
    engine: MySQL
    version: "8.0"
    primary_key: UUID v4 (CHAR 36)
    incremental_ids: PROIBIDO

architecture:
  style: Domain-Driven Design (simplificado)
  communication: Inertia.js (sem API REST separada)
  backend_pattern: "Controller → Service (via Interface) → Eloquent → MySQL"
  frontend_pattern: "Vue Page → Pinia Store → Inertia Router → Backend"
  business_logic_owner: Service Layer (backend exclusivo)
  crud_pattern: Modal-based (sem páginas Create/Edit separadas)

api:
  style: Inertia.js (server-driven SPA)
  rest_api: false
  response_write: "redirect()->back()->with()"
  response_read: "Inertia::render()"
  validation_errors: "FormRequest automático (422)"
  pagination: "meta object (current_page, per_page, total, last_page)"

state_management:
  library: Pinia
  scope: UI state only (modais, item atual, filtros)
  financial_calculations: PROIBIDO no frontend
  pattern:
    - isModalOpen
    - "modalMode: 'create' | 'edit' | 'view'"
    - currentItem
    - deletingUid
