# =============================================================================
# Himel App — Glossário do Domínio Financeiro
# Termos padronizados do domínio. Usar SEMPRE estes termos no código e UI.
# =============================================================================

terms:

  # --- Entidades Principais ---

  transaction:
    pt: Transação / Movimentação
    en: Transaction
    definition: >
      Registro de entrada ou saída de dinheiro vinculado a uma conta financeira.
      Possui direction (INFLOW/OUTFLOW), status (PENDING/PAID/OVERDUE) e source
      (MANUAL/CREDIT_CARD/FIXED/TRANSFER).
    table: financial_transactions
    model: FinancialTransaction

  account:
    pt: Conta Financeira
    en: Financial Account
    definition: >
      Conta bancária ou carteira do usuário. Tipos: CHECKING (corrente),
      SAVINGS (poupança), CASH (dinheiro), OTHER (outro).
      Possui saldo (balance) atualizado apenas por transações PAID.
    table: financial_accounts
    model: FinancialAccount

  category:
    pt: Categoria
    en: Category
    definition: >
      Classificação de transações por natureza. Possui direction fixa
      (INFLOW ou OUTFLOW). Categorias padrão são criadas no onboarding.
    table: financial_categories
    model: FinancialCategory

  period:
    pt: Período
    en: Period
    definition: >
      Período mensal (mês/ano) criado pelo usuário para organizar transações.
      Eixo central de organização. Unique por (user, month, year).
      Inicialização carrega despesas fixas e parcelas de cartão.
    table: financial_periods
    model: FinancialPeriod

  transfer:
    pt: Transferência
    en: Transfer
    definition: >
      Movimentação atômica entre duas contas do mesmo usuário.
      Gera duas transações: OUTFLOW na origem, INFLOW no destino.
      Operação via DB::transaction.
    table: financial_transfers
    model: FinancialTransfer

  # --- Cartão de Crédito ---

  credit_card:
    pt: Cartão de Crédito
    en: Credit Card
    definition: >
      Cartão do usuário com closing_day (fechamento) e due_day (vencimento).
      Tipos: PHYSICAL ou VIRTUAL. Armazena apenas last_four_digits.
    table: financial_credit_cards
    model: FinancialCreditCard

  charge:
    pt: Compra no Cartão
    en: Credit Card Charge
    definition: >
      Registro pai de uma compra no cartão de crédito.
      Contém total_amount e número de installments (1-48).
      Gera automaticamente N parcelas ao ser criado.
    table: financial_credit_card_charges
    model: FinancialCreditCardCharge

  installment:
    pt: Parcela
    en: Installment
    definition: >
      Parcela individual de uma compra no cartão. Cada parcela gera uma
      FinancialTransaction com source=CREDIT_CARD. Centavos residuais
      vão para a última parcela.
    table: financial_credit_card_installments
    model: FinancialCreditCardInstallment

  fixed_expense:
    pt: Despesa Fixa
    en: Fixed Expense
    definition: >
      Despesa recorrente mensal com due_day fixo. Pode ser pausada (active=false).
      Na inicialização de período, gera transações PENDING com source=FIXED.
    table: financial_fixed_expenses
    model: FinancialFixedExpense

  # --- Conceitos Financeiros ---

  balance:
    pt: Saldo
    en: Balance
    definition: >
      Valor atual de uma conta financeira. Atualizado APENAS por transações
      com status PAID. Transações PENDING e OVERDUE NÃO afetam o saldo.
    field: financial_accounts.balance

  inflow:
    pt: Entrada / Receita
    en: Inflow / Income
    definition: >
      Movimentação que aumenta o saldo da conta. direction=INFLOW.
      Exemplos: salário, freelance, investimentos.

  outflow:
    pt: Saída / Despesa
    en: Outflow / Expense
    definition: >
      Movimentação que diminui o saldo da conta. direction=OUTFLOW.
      Exemplos: alimentação, moradia, transporte.

  direction:
    pt: Direção
    en: Direction
    definition: >
      Define a natureza da movimentação: INFLOW (entrada) ou OUTFLOW (saída).
      Categorias e transações possuem direction. DEVEM ser consistentes entre si.

  status:
    pt: Status
    en: Status
    definition: >
      Estado do ciclo de vida de uma transação:
      PENDING (aguardando), PAID (pago), OVERDUE (vencido).

  source:
    pt: Origem
    en: Source
    definition: >
      Indica como a transação foi criada:
      MANUAL (pelo usuário), CREDIT_CARD (parcela de cartão),
      FIXED (despesa fixa), TRANSFER (transferência entre contas).

  due_date:
    pt: Data de Vencimento
    en: Due Date
    definition: >
      Data prevista para pagamento de uma transação.
      Transações PENDING com due_date < now() tornam-se OVERDUE.

  occurred_at:
    pt: Data de Ocorrência
    en: Occurred At
    definition: >
      Data em que a transação efetivamente ocorreu.
      Campo obrigatório em toda transação.

  paid_at:
    pt: Data de Pagamento
    en: Paid At
    definition: >
      Data em que o pagamento foi confirmado pelo usuário.
      Preenchido quando status muda para PAID.

  initialization:
    pt: Inicialização de Período
    en: Period Initialization
    definition: >
      Processo que carrega automaticamente despesas fixas ativas e parcelas
      de cartão pendentes para um período. DEVE ser idempotente.
