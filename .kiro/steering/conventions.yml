# =============================================================================
# Himel App — Conventions
# Convenções de código, nomenclatura, organização e commits.
# =============================================================================

typescript:
  strict_mode: true
  any_type: PROIBIDO
  props: "defineProps<T>()"
  emits: "defineEmits<T>()"
  type_inference: "z.infer<typeof schema>"
  file_extension: .ts (lógica), .vue (componentes)

php:
  version: "8.4"
  strict_types: true
  constructor_promotion: true
  return_types: obrigatório
  parameter_types: obrigatório
  enum_keys: TitleCase
  curly_braces: sempre (mesmo single-line)

naming:
  # Backend
  models: PascalCase singular (Account, CreditCard)
  controllers: PascalCase + Controller suffix (AccountController)
  page_controllers: PascalCase + PageController suffix (AccountPageController)
  services: PascalCase + Service suffix (AccountService)
  interfaces: PascalCase + ServiceInterface suffix (AccountServiceInterface)
  requests: "Store{Entity}Request, Update{Entity}Request"
  resources: PascalCase + Resource suffix (AccountResource)
  policies: PascalCase + Policy suffix (AccountPolicy)
  exceptions: PascalCase + Exception suffix (PeriodAlreadyExistsException)
  tables: snake_case plural com prefixo financial_ (financial_accounts)
  columns: snake_case (user_id, due_date, occurred_at)
  foreign_keys: "{model}_uid ou {model}_id"
  routes: "finance.{entity_plural}.{action}"

  # Frontend
  vue_components: PascalCase (AccountForm.vue, DataTable.vue)
  composables: "use{Name} (useFinanceFilters, useCrudToast)"
  stores: "use{Entity}Store (useAccountStore)"
  zod_schemas: "camelCase + Schema suffix ({entity}Schema)"
  types: PascalCase (Transaction, Account)
  pages: "resources/js/pages/finance/{entity}/Index.vue"

file_organization:
  backend:
    domain: "app/Domain/{Entity}/"
    contracts: "app/Domain/{Entity}/Contracts/"
    controllers: "app/Domain/{Entity}/Controllers/"
    exceptions: "app/Domain/{Entity}/Exceptions/"
    models: "app/Domain/{Entity}/Models/"
    policies: "app/Domain/{Entity}/Policies/"
    requests: "app/Domain/{Entity}/Requests/"
    resources: "app/Domain/{Entity}/Resources/"
    routes: "app/Domain/{Entity}/Routes/"
    services: "app/Domain/{Entity}/Services/"

  frontend:
    pages: "resources/js/pages/finance/{entity}/"
    components: "resources/js/modules/finance/components/"
    stores: "resources/js/modules/finance/stores/"
    composables: "resources/js/modules/finance/composables/"
    services: "resources/js/modules/finance/services/"
    types: "resources/js/modules/finance/types/"
    validations: "resources/js/modules/finance/validations/"
    ui: "resources/js/components/ui/"

  tests:
    feature: "tests/Feature/{Entity}/"
    unit: "tests/Unit/"

commits:
  standard: Conventional Commits (https://www.conventionalcommits.org)
  pattern: "type(scope?): descrição"
  breaking_change_pattern: "type(scope?)!: descrição"
  types:
    - feat      # Nova funcionalidade
    - fix       # Correção de bug
    - chore     # Manutenção, configs, deps
    - docs      # Documentação
    - refactor  # Refatoração sem mudança de comportamento
    - test      # Adição ou correção de testes
    - style     # Formatação, espaços, ponto-e-vírgula
    - perf      # Melhoria de performance
    - ci        # Alterações de CI/CD
    - build     # Alterações no sistema de build
  scopes_sugeridos:
    - account
    - transaction
    - transfer
    - period
    - category
    - credit-card
    - fixed-expense
    - auth
    - ui
    - api
  examples:
    - "feat(transaction): adicionar filtro por período na listagem"
    - "fix(credit-card): corrigir cálculo de centavos residuais nas parcelas"
    - "refactor(period): extrair lógica de inicialização para service"
    - "feat(account)!: alterar estrutura de tipos de conta"
    - "chore: atualizar dependências do projeto"
    - "docs: atualizar steering files do projeto"
  body: opcional, usar para contexto adicional
  footer: opcional, usar para BREAKING CHANGE ou referências (ex: "Refs: PROJETO-1234")
  branch_pattern: "type/descricao-curta"
  branch_examples:
    - "feat/filtro-periodo-transacoes"
    - "fix/correcao-parcelas-cartao"
    - "refactor/service-layer-period"

messages:
  language: pt-BR
  error_messages: pt-BR
  validation_messages: pt-BR
  toast_messages: pt-BR
  code_comments: pt-BR ou en (flexível)
  variable_names: en (obrigatório)
